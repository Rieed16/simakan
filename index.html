<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk - Simakan</title>
    <link href="output.css" rel="stylesheet">
    <!-- Google Fonts: Inter untuk tampilan modern & profesional -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome untuk ikon input -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body class="bg-brand-snow min-h-screen flex items-center justify-center overflow-x-hidden antialiased">

    <!-- Container Utama: Split Screen Grid -->
    <div class="grid grid-cols-1 md:grid-cols-2 min-h-screen w-full">

        <!-- SISI KIRI: Pola Herringbone & Highlight Card -->
        <div class="bg-herringbone hidden md:flex flex-col justify-between p-12 lg:p-16 relative">

            <!-- Logo Brand Kiri atas -->
            <div class="flex items-center space-x-3 z-10">
                <span class="text-2xl font-black text-white tracking-wide drop-shadow-sm">Sistem Informasi Manajemen Makanan Pasien</span>
            </div>

            <!-- Footer Kiri -->
            <div class="text-white text-sm z-10 flex justify-between font-medium">
                <span>© 2026 Simakan.</span>
            </div>
        </div>

        <!-- SISI KANAN: Form Login Sederhana -->
        <div class="flex flex-col justify-center px-6 py-12 lg:px-16 xl:px-24 bg-white relative">

            <!-- Logo kecil untuk mobile (MD ke bawah) -->
            <div class="flex items-center space-x-3 md:hidden absolute top-8 left-6">
                <div class="h-9 w-9 rounded-xl bg-brand-primary flex items-center justify-center text-brand-snow">
                    <i class="fa-solid fa-utensils"></i>
                </div>
                <span class="text-lg font-bold text-brand-dark tracking-wide">Simakan</span>
            </div>

            <!-- Wrapper Form agar terpusat sempurna -->
            <div class="mx-auto w-full max-w-md">

                <!-- Judul Utama -->
                <div class="mb-10 text-left">
                    <h2 class="text-3xl font-bold tracking-tight text-brand-dark mb-2">Selamat Datang</h2>
                    <p class="text-brand-muted">Silakan masukkan username dan kata sandi Anda untuk mengakses dashboard.</p>
                </div>

                <!-- FORM UTAMA (Disambung ke PHP prosesor login) -->
                <form id="loginForm" action="login.php" method="POST" class="space-y-6">

                    <!-- Input Username -->
                    <div>
                        <label for="username" class="block text-sm font-semibold text-brand-dark mb-2">Username</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none text-brand-muted">
                                <i class="fa-regular fa-user"></i>
                            </span>
                            <input type="text" id="username" name="username" required
                                class="block w-full pl-10 pr-4 py-3 border border-brand-light rounded-xl text-brand-dark placeholder:text-brand-muted focus:outline-none focus:ring-2 focus:ring-brand-primary/20 focus:border-brand-primary transition duration-200 text-sm"
                                placeholder="Masukkan username kamu">
                        </div>
                    </div>

                    <!-- Input Password -->
                    <div>
                        <div class="flex items-center justify-between mb-2">
                            <label for="password" class="block text-sm font-semibold text-brand-dark">Kata Sandi</label>
                            <a href="lupa_sandi.html" class="text-sm font-semibold text-brand-primary hover:text-brand-primary/80 transition-colors">Lupa sandi?</a>
                        </div>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none text-brand-muted">
                                <i class="fa-solid fa-lock"></i>
                            </span>
                            <input type="password" id="password" name="password" required
                                class="block w-full pl-10 pr-12 py-3 border border-brand-light rounded-xl text-brand-dark placeholder:text-brand-muted focus:outline-none focus:ring-2 focus:ring-brand-primary/20 focus:border-brand-primary transition duration-200 text-sm"
                                placeholder="••••••••">

                            <!-- Tombol Toggle Show/Hide Password -->
                            <button type="button" onclick="togglePassword()"
                                class="absolute inset-y-0 right-0 flex items-center pr-3.5 text-brand-muted hover:text-brand-dark transition-colors">
                                <i id="eyeIcon" class="fa-regular fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Pilihan Ingat Saya -->
                    <div class="flex items-center">
                        <input id="remember-me" name="remember_me" type="checkbox"
                            class="h-4 w-4 rounded border-brand-light text-brand-primary focus:ring-brand-primary/30 accent-brand-primary">
                        <label for="remember-me" class="ml-2.5 block text-sm text-brand-muted select-none">Ingat saya di perangkat ini</label>
                    </div>

                    <!-- Tombol Submit -->
                    <button type="submit"
                        class="w-full flex justify-center py-3.5 px-4 border border-transparent rounded-xl shadow-md text-sm font-semibold text-brand-snow bg-brand-primary hover:bg-brand-primary/90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-primary transition-all duration-200 active:scale-[0.98]">
                        Masuk Sekarang
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- SCRIPT INTERAKTIF -->
    <script>
        // Fungsi untuk toggle password (Sembunyikan / Tampilkan)
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.classList.remove('fa-eye');
                eyeIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                eyeIcon.classList.remove('fa-eye-slash');
                eyeIcon.classList.add('fa-eye');
            }
        }
    </script>
</body>

</html>
