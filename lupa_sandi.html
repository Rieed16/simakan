<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lupa Sandi - Simakan</title>
    <link href="output.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-brand-snow min-h-screen flex items-center justify-center font-sans antialiased">

    <div class="max-w-md w-full bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
        <h2 class="text-2xl font-bold text-brand-dark mb-2 text-center">Reset Kata Sandi</h2>
        <p class="text-sm text-brand-gray text-center mb-6">Masukkan username kamu dan buat kata sandi yang baru.</p>

        <form action="reset_sandi.php" method="POST" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-brand-dark mb-1">Username</label>
                <input type="text" name="username" required
                    class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-brand-primary/20 focus:border-brand-primary transition-all">
            </div>

            <div>
                <label class="block text-sm font-medium text-brand-dark mb-1">Kata Sandi Baru</label>
                <input type="password" name="password_baru" required
                    class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-brand-primary/20 focus:border-brand-primary transition-all">
            </div>

            <button type="submit"
                class="w-full py-3.5 px-4 rounded-xl text-sm font-semibold text-brand-snow bg-brand-primary hover:bg-brand-primary/90 transition-all duration-200 mt-2">
                Simpan Sandi Baru
            </button>
        </form>

        <div class="mt-6 text-center">
            <a href="index.html" class="text-sm font-semibold text-brand-primary hover:underline">Kembali ke Halaman Masuk</a>
        </div>
    </div>

</body>
</html>
